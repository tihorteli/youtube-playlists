<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerTube Search Engine</title>
    <style>
        :root { --primary: #ff0000; --bg: #f9f9f9; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #282828; margin-bottom: 20px; }
        .search-box { display: flex; width: 100%; max-width: 600px; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 24px; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 24px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-5px); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-info { padding: 12px; }
        .video-title { font-size: 14px; font-weight: bold; margin: 0 0 8px 0; color: #0f0f0f; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .video-meta { font-size: 12px; color: #606060; }
        a { text-decoration: none; }
        .loader { font-style: italic; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>TubeSearch</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Search YouTube (e.g. cat videos)" onkeypress="if(event.key === 'Enter') search()">
        <button onclick="search()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function search() {
            const query = document.getElementById('query').value.trim();
            const resultsDiv = document.getElementById('results');
            if (!query) return;

            resultsDiv.innerHTML = '<div class="loader">Fetching videos from InnerTube...</div>';

            // Public CORS proxy to bypass YouTube's browser restrictions
            const proxy = "https://api.allorigins.win";
            const target = encodeURIComponent(`https://www.youtube.com{encodeURIComponent(query)}`);

            try {
                const response = await fetch(proxy + target);
                if (!response.ok) throw new Error("Proxy error");
                
                const data = await response.json();
                const html = data.contents;

                // Extract the JSON data object YouTube embeds in the page
                const jsonStr = html.match(/ytInitialData = ({.*?});/)?.[1];
                if (!jsonStr) throw new Error("Could not parse YouTube response");

                const ytData = JSON.parse(jsonStr);
                
                // Navigate deep into the JSON structure to find the video list
                const contents = ytData.contents?.twoColumnSearchResultsRenderer?.primaryContents?.sectionListRenderer?.contents?.[0]?.itemSectionRenderer?.contents;

                if (!contents || contents.length === 0) {
                    resultsDiv.innerHTML = "No videos found.";
                    return;
                }

                resultsDiv.innerHTML = ""; // Clear loader

                contents.forEach(item => {
                    const video = item.videoRenderer;
                    if (!video) return;

                    const videoId = video.videoId;
                    const title = video.title.runs[0].text;
                    const thumbnail = video.thumbnail.thumbnails[0].url;
                    const channel = video.ownerText.runs[0].text;
                    const views = video.viewCountText?.simpleText || "";

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <a href="https://www.youtube.com{videoId}" target="_blank">
                            <img src="${thumbnail}" alt="${title}">
                            <div class="video-info">
                                <h3 class="video-title">${title}</h3>
                                <div class="video-meta">${channel} • ${views}</div>
                            </div>
                        </a>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = `<div style="color:red">Error: ${err.message}. Please try again later.</div>`;
            }
        }
    </script>
</body>
</html>
