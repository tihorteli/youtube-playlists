<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerTube Search</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .search-container { margin-bottom: 20px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .video-card img { width: 100%; border-radius: 4px; }
        .video-card h3 { font-size: 1rem; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>YouTube Search (InnerTube)</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search videos (e.g., cat)...">
        <button onclick="searchVideos()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function searchVideos() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Searching...";

            try {
                // Initialize Innertube (Client-side)
                const innertube = await window.youtubei.Innertube.create();
                
                // Fetch videos using search query
                const searchResults = await innertube.search(query);
                
                resultsDiv.innerHTML = ""; // Clear loader

                // Loop through results and display video thumbnails/titles
                searchResults.videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <a href="https://www.youtube.com{video.id}" target="_blank">
                            <img src="${video.thumbnails[0].url}" alt="${video.title}">
                            <h3>${video.title}</h3>
                        </a>
                        <p>${video.author?.name || 'Unknown'}</p>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching videos:", error);
                resultsDiv.innerHTML = "Error loading videos. Check console for details.";
            }
        }
    </script>
</body>
</html>
