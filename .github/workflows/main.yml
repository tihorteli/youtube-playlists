name: Update YouTube Playlists Daily

on:
  schedule:
    - cron: '0 2 * * *'
  
  workflow_dispatch:
  
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-playlists:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 📦 Install dependencies
        run: |
          npm init -y
          npm install node-fetch@2
      
      - name: 🎬 Run playlist update script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node update-playlists.js
      
      - name: 📊 Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT
      
      - name: ⚙️ Configure Git
        if: steps.git-check.outputs.changed != '0'
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
      
      - name: 💾 Commit and push changes
        if: steps.git-check.outputs.changed != '0'
        run: |
          git add playlists.json playlists.min.json playlists-meta.json
          git commit -m "🔄 Daily playlist update - $(date +'%Y-%m-%d')"
          git push
      
      - name: ✅ Update complete
        run: echo "✅ Playlists updated successfully!"
